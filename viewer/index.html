<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Lens : Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-mesh">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>
    
    <header class="glass-header">
        <h1>State Lens : Chat</h1>
        <div class="status-indicator">
            <span class="pulse"></span>
            Listening...
        </div>
    </header>

    <main class="container">
        <section class="summary-panel">
            <div class="summary-title">
                <h2>Conversation Metrics</h2>
                <span id="analysisMeta" class="meta-chip">解析情報を読み込み中...</span>
            </div>
            <div id="threadSummary" class="summary-grid">
                <div class="loading">スレッド集計を読み込み中...</div>
            </div>
        </section>

        <div class="feed-header">
            <h2>Real-time Stream <span id="msgCount">(0)</span></h2>
            <button id="refreshBtn" class="btn-refresh">🔄 Refresh</button>
        </div>
        <div id="messageFeed" class="message-feed">
            <div class="loading">Loading messages...</div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
